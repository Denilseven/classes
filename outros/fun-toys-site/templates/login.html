{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block main %}
    <h2>Login</h2>
    
    <form action="/login" method="post">
        <input autocomplete="off" autofocus name="username" placeholder="Usuário" type="text">
        <input autocomplete="off" name="password" placeholder="Senha" type="password">
        <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
{% endblock %}
